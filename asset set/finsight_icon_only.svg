<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>FinSight Icon Only</title>
  <desc>Abstract F logo with upward financial chart arrow for FinSight.</desc>

  <defs>
    <linearGradient id="finsightBlue" x1="96" y1="416" x2="416" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.45" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0284C7" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Abstract F body -->
    <path d="M138 166
             C138 155 147 146 158 146
             H345
             C358 146 367 159 362 171
             L342 221
             C338 231 329 237 318 237
             H215
             V267
             H329
             C343 267 352 281 346 293
             L323 342
             C319 351 310 357 300 357
             H215
             V407
             L138 451
             V166Z"
          fill="url(#finsightBlue)"/>

    <!-- Inner negative style cut line -->
    <path d="M215 207
             H326
             C336 207 343 197 340 187
             L336 178
             H215
             V207Z"
          fill="white" fill-opacity="0.95"/>

    <path d="M215 300
             H311
             C321 300 328 291 325 281
             L322 272
             H215
             V300Z"
          fill="white" fill-opacity="0.95"/>

    <!-- Lower swoosh cut -->
    <path d="M138 346
             C183 318 232 309 300 313
             C247 322 203 337 138 381
             V346Z"
          fill="white" fill-opacity="0.95"/>

    <!-- Chart line -->
    <path d="M121 165
             L174 132
             L238 168
             L313 121
             L342 142
             L407 77"
          stroke="url(#finsightBlue)"
          stroke-width="22"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Arrow head -->
    <path d="M391 63
             L442 52
             L431 103
             L413 85
             L356 142
             L338 124
             L395 67
             L391 63Z"
          fill="url(#finsightBlue)"/>

    <!-- Chart nodes -->
    <circle cx="121" cy="165" r="18" fill="url(#finsightBlue)"/>
    <circle cx="174" cy="132" r="18" fill="url(#finsightBlue)"/>
  </g>
</svg>
